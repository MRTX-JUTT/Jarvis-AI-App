name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # تمام ضروری ٹولز جو ہم نے پچھلے ایررز میں ٹھیک کیے
          sudo apt-get install -y autoconf automake libtool pkg-config python3-pip cython3 libffi-dev m4 libltdl-dev
          pip install --upgrade pip
          pip install "Cython<3.0" 
          pip install buildozer setuptools

      - name: Force Link Libtool Macros
        run: |
          # LT_SYS_SYMBOL_USCORE ایرر کا حل
          sudo cp /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltoptions.m4 /usr/share/aclocal/ltsugar.m4 /usr/share/aclocal/ltversion.m4 /usr/share/aclocal/lt~obsolete.m4 . || true

      - name: Auto-Accept Android SDK Licenses
        run: |
          # لائسنس والا مسئلہ ختم کرنے کے لیے
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | sdkmanager --licenses || true

      - name: Build with Buildozer
        run: |
          # اصل بلڈ کا عمل
          yes | buildozer android debug

      - name: Upload APK Artifact
        # یہ وہ سٹیپ ہے جو APK فائل کو ڈاؤن لوڈ کے لیے سامنے لائے گا
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-AI-Final-APK
          path: bin/*.apk
