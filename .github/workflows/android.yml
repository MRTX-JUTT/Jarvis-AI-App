name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # تصویر 10221da3 کے مطابق cython3 انسٹال کریں
          sudo apt-get install -y python3-pip cython3 libffi-dev 
          pip install --upgrade pip
          # مخصوص ورژن جو Kivy 2.3.0 کے ساتھ کام کرتا ہے
          pip install Cython==0.29.33 
          pip install buildozer

      - name: Build with Buildozer
        # اب ہم کسی ایکشن پر منحصر نہیں، براہ راست کمانڈ چلائیں گے
        run: |
          yes | buildozer android debug
