name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # تصویر 10221da3 کے مطابق cython3 کا استعمال لازمی ہے
          sudo apt-get install -y python3-pip cython3 libffi-dev 
          # پائتھن کے لیے بلڈوزر اور ٹولز
          pip install --user --upgrade buildozer setuptools
          # مخصوص ورژن تاکہ مطابقت رہے
          pip install --user Cython==0.29.33 

      - name: Build with Buildozer
        # اس بار ہم ایک ایسا طریقہ استعمال کر رہے ہیں جو ڈویلپر کے نام پر منحصر نہیں
        run: |
          yes | buildozer android debug
        env:
          # لائسنس خود بخود قبول کرنے کے لیے
          ACCEPT_SDK_LICENSE: "True"
