name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # سسٹم لیول پر ضروری لائبریریز (تصویر 10221da3 کے مطابق)
          sudo apt-get install -y python3-pip cython3 libffi-dev 
          pip install --upgrade pip
          # مخصوص ورژن جو Kivy کے ساتھ مستحکم ہے
          pip install "Cython<3.0" 
          pip install buildozer setuptools

      - name: Build with Buildozer
        # ہم براہ راست کمانڈ چلا رہے ہیں تاکہ کسی ایکشن کی اسپیلنگ کا مسئلہ نہ آئے
        run: |
          # اینڈرائیڈ SDK لائسنس خودکار قبول کرنے کے لیے
          yes | buildozer android debug
