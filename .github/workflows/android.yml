name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # یہاں ہم libtool اور m4 شامل کر رہے ہیں جو اس ایرر کو ختم کریں گے
          sudo apt-get install -y autoconf automake libtool pkg-config python3-pip cython3 libffi-dev m4
          pip install --upgrade pip
          pip install "Cython<3.0" 
          pip install buildozer setuptools

      - name: Fix Libtool Macro Error
        run: |
          # یہ کمانڈ ان میکروز کو لنک کرے گی جو غائب ہیں
          sudo ln -s /usr/share/aclocal/libtool.m4 /usr/share/aclocal/ltoptions.m4 || true
          sudo ln -s /usr/share/aclocal/ltsugar.m4 /usr/share/aclocal/ltversion.m4 || true
          sudo ln -s /usr/share/aclocal/lt~obsolete.m4 /usr/share/aclocal/lt~obsolete.m4 || true

      - name: Build with Buildozer
        run: |
          yes | buildozer android debug
