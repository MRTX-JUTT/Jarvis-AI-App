name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04  # ہم نے ورژن 22.04 پر فکس کر دیا ہے کیونکہ یہ زیادہ مستحکم ہے
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # اینڈرائیڈ بلڈ کے لیے 3.9 سب سے بہترین ہے

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake libtool pkg-config python3-pip cython3 libffi-dev libssl-dev
          pip install --upgrade pip
          pip install "Cython<3.0" 
          pip install buildozer setuptools

      - name: Build with Buildozer
        run: |
          # ہم لاگ لیول 2 استعمال کر رہے ہیں تاکہ اصل غلطی نظر آئے
          buildozer android debug || buildozer android debug log_level=2
        env:
          ACCEPT_SDK_LICENSE: "True"
